name: Migrar URLs para gaveblue.com.br

on:
  push:
    branches:
      - migrar-dominio-com-br

permissions:
  contents: write

jobs:
  atualizar-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: migrar-dominio-com-br
          fetch-depth: 0

      - name: Atualizar URLs antigas para gaveblue.com.br
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          extensoes = {'.html', '.js', '.css', '.txt', '.xml', '.json', '.md'}
          alterados = []

          for caminho in Path('.').rglob('*'):
              if not caminho.is_file() or '.git' in caminho.parts or '.github' in caminho.parts:
                  continue
              if caminho.suffix.lower() not in extensoes and caminho.name != 'CNAME':
                  continue

              try:
                  conteudo = caminho.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue

              novo = re.sub(r'https?://gaveblue\.com(?!\.br)', 'https://gaveblue.com.br', conteudo)
              novo = re.sub(r'https?://giveblue\.com(?:\.br)?', 'https://gaveblue.com.br', novo)

              if novo != conteudo:
                  caminho.write_text(novo, encoding='utf-8')
                  alterados.append(str(caminho))

          print(f'{len(alterados)} arquivo(s) atualizado(s) para gaveblue.com.br:')
          for arquivo in alterados:
              print(arquivo)
          PY

      - name: Remover workflow temporário
        run: rm -f .github/workflows/migrar-dominio.yml

      - name: Commitar alterações
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteração necessária."
            exit 0
          fi
          git commit -m "Atualiza URLs para gaveblue.com.br"
          git push origin HEAD:migrar-dominio-com-br
