name: Organizar módulo WeTasks

on:
  push:
    branches:
      - organizar-wetasks
    paths:
      - .github/workflows/organizar-wetasks.yml
      - .github/organizar-wetasks.txt

permissions:
  contents: write

jobs:
  organizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: organizar-wetasks
          fetch-depth: 0

      - name: Criar estrutura do módulo
        shell: bash
        run: |
          set -euo pipefail

          test -f wetasks.html
          test -f wetasks.css
          test -f wetasks.js

          mkdir -p wetasks/css wetasks/js

          cp wetasks.html wetasks/index.html
          cp wetasks.css wetasks/css/style.css
          cp wetasks.js wetasks/js/app.js

          python - <<'PY'
          from pathlib import Path

          path = Path('wetasks/index.html')
          html = path.read_text(encoding='utf-8')
          html = html.replace('href="wetasks.css"', 'href="./css/style.css"')
          html = html.replace("href='wetasks.css'", "href='./css/style.css'")
          html = html.replace('src="wetasks.js"', 'src="./js/app.js"')
          html = html.replace("src='wetasks.js'", "src='./js/app.js'")
          html = html.replace('gaveblue.com', 'gaveblue.com.br')
          path.write_text(html, encoding='utf-8')
          PY

          cat > wetasks.html <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta http-equiv="refresh" content="0; url=/wetasks/">
            <link rel="canonical" href="https://gaveblue.com.br/wetasks/">
            <title>Redirecionando para WeTasks</title>
            <script>window.location.replace('/wetasks/');</script>
          </head>
          <body>
            <p>Redirecionando para <a href="/wetasks/">WeTasks</a>...</p>
          </body>
          </html>
          HTML

          rm wetasks.css wetasks.js
          rm -f .github/workflows/organizar-wetasks.yml .github/organizar-wetasks.txt

      - name: Validar estrutura
        shell: bash
        run: |
          test -f wetasks/index.html
          test -f wetasks/css/style.css
          test -f wetasks/js/app.js
          test ! -f wetasks.css
          test ! -f wetasks.js
          grep -q './css/style.css' wetasks/index.html
          grep -q './js/app.js' wetasks/index.html
          grep -q '/wetasks/' wetasks.html

      - name: Commitar reorganização
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Organiza arquivos do módulo WeTasks"
          git push origin HEAD:organizar-wetasks
