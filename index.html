  <style>
    body {
      box-sizing: border-box;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 0.3; }
      100% { transform: scale(0.8); opacity: 0.8; }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    @keyframes gear-rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes gear-rotate-reverse {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }
    
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    
    .pulse-ring {
      animation: pulse-ring 3s ease-in-out infinite;
    }
    
    .shimmer-text {
      background: linear-gradient(90deg, currentColor 0%, rgba(255,255,255,0.8) 50%, currentColor 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
    
    .gear-spin {
      animation: gear-rotate 8s linear infinite;
    }
    
    .gear-spin-reverse {
      animation: gear-rotate-reverse 6s linear infinite;
    }
    
    @keyframes run {
      0% {
        transform: translateY(0px);
      }
      25% {
        transform: translateY(-2px);
      }
      50% {
        transform: translateY(0px);
      }
      75% {
        transform: translateY(-2px);
      }
      100% {
        transform: translateY(0px);
      }
    }
    
    .runner-animate {
      animation: run 0.4s ease-in-out infinite;
    }
    
    @keyframes left-arm-swing {
      0%, 100% { transform: rotate(-20deg); transform-origin: 50px 35px; }
      50% { transform: rotate(40deg); transform-origin: 50px 35px; }
    }
    
    @keyframes right-arm-swing {
      0%, 100% { transform: rotate(40deg); transform-origin: 50px 35px; }
      50% { transform: rotate(-20deg); transform-origin: 50px 35px; }
    }
    
    @keyframes left-leg-swing {
      0%, 100% { transform: rotate(30deg); transform-origin: 50px 55px; }
      50% { transform: rotate(-20deg); transform-origin: 50px 55px; }
    }
    
    @keyframes right-leg-swing {
      0%, 100% { transform: rotate(-20deg); transform-origin: 50px 55px; }
      50% { transform: rotate(30deg); transform-origin: 50px 55px; }
    }
    
    .left-arm {
      animation: left-arm-swing 0.4s ease-in-out infinite;
    }
    
    .right-arm {
      animation: right-arm-swing 0.4s ease-in-out infinite;
    }
    
    .left-leg {
      animation: left-leg-swing 0.4s ease-in-out infinite;
    }
    
    .right-leg {
      animation: right-leg-swing 0.4s ease-in-out infinite;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.5; }
    }

    @keyframes float-sparkle {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.1; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-20px) translateX(10px); opacity: 0.1; }
    }

    @keyframes universe-drift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-200px, -200px); }
    }

    #sparkles-container {
      animation: universe-drift 6s linear infinite !important;
    }

    @keyframes float-deep {
      0% { transform: translateZ(-100px); opacity: 0.15; }
      50% { opacity: 0.4; }
      100% { transform: translateZ(100px); opacity: 0.15; }
    }

    @keyframes galaxy-rotate-1 {
      0% { transform: rotate(0deg) scale(1); }
      100% { transform: rotate(360deg) scale(1.1); }
    }

    @keyframes galaxy-rotate-2 {
      0% { transform: rotate(360deg) scale(1); }
      100% { transform: rotate(0deg) scale(0.95); }
    }

    @keyframes galaxy-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    .sparkle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, #a78bfa, #7c3aed);
      animation: sparkle 4s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(167, 139, 250, 0.6), 0 0 20px rgba(217, 70, 239, 0.3);
    }

    .sparkle-moving {
      animation: float-sparkle 6s ease-in-out infinite;
    }

    .sparkle-deep {
      animation: float-deep 8s ease-in-out infinite;
    }

    #sparkles-container {
      animation: universe-drift 15s linear infinite;
    }

    .galaxy {
      position: absolute;
      border-radius: 50%;
      opacity: 0.4;
    }

    .galaxy-1 {
      animation: galaxy-rotate-1 20s linear infinite, galaxy-pulse 8s ease-in-out infinite;
    }

    .galaxy-2 {
      animation: galaxy-rotate-2 25s linear infinite, galaxy-pulse 10s ease-in-out infinite;
    }
  </style>

  <script>
    // Generate sparkles - universe background
    function createSparkles() {
      const container = document.getElementById('sparkles-container');
      const sparkleCount = 200; // Increased from 40
      
      for (let i = 0; i < sparkleCount; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        
        const x = Math.random() * 150 - 25; // Extended range for continuous animation
        const y = Math.random() * 150 - 25;
        const size = 1 + Math.random() * 3;
        const delay = Math.random() * 6;
        const duration = 4 + Math.random() * 5;
        const randomType = Math.random();
        
        sparkle.style.left = x + '%';
        sparkle.style.top = y + '%';
        sparkle.style.width = size + 'px';
        sparkle.style.height = size + 'px';
        sparkle.style.animationDelay = delay + 's';
        sparkle.style.animationDuration = duration + 's';
        
        if (randomType > 0.7) {
          sparkle.classList.add('sparkle-moving');
          sparkle.style.animationDuration = (5 + Math.random() * 5) + 's';
        } else if (randomType > 0.4) {
          sparkle.classList.add('sparkle-deep');
          sparkle.style.animationDuration = (6 + Math.random() * 6) + 's';
        }
        
        container.appendChild(sparkle);
      }
    }

    // Enhanced mouse sparkle effects
    const container = document.getElementById('sparkles-container');
    const mouseGlowContainer = document.createElement('div');
    mouseGlowContainer.id = 'mouse-sparkles';
    mouseGlowContainer.style.position = 'fixed';
    mouseGlowContainer.style.pointerEvents = 'none';
    mouseGlowContainer.style.zIndex = '999';
    document.body.appendChild(mouseGlowContainer);
    
    document.addEventListener('mousemove', (e) => {
      // Create occasional larger and more frequent sparkles under cursor
      if (Math.random() > 0.88) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        
        const size = 2 + Math.random() * 5;
        sparkle.style.left = e.clientX + 'px';
        sparkle.style.top = e.clientY + 'px';
        sparkle.style.position = 'fixed';
        sparkle.style.width = size + 'px';
        sparkle.style.height = size + 'px';
        sparkle.style.pointerEvents = 'none';
        sparkle.style.animationDuration = (1.5 + Math.random() * 1) + 's';
        sparkle.style.animationDelay = '0s';
        sparkle.style.zIndex = '999';
        sparkle.style.boxShadow = '0 0 15px rgba(167, 139, 250, 0.8), 0 0 30px rgba(217, 70, 239, 0.5)';
        
        mouseGlowContainer.appendChild(sparkle);
        
        setTimeout(() => sparkle.remove(), 2500);
      }
    });

    createSparkles();

    const defaultConfig = {
      main_title: 'Em Manutenção',
      subtitle: 'Voltamos em breve!',
      description: 'Estamos trabalhando para melhorar sua experiência. Nossa equipe está realizando atualizações importantes no sistema.',
      background_color: '#0f0a1a',
      surface_color: '#1a0f3a',
      text_color: '#f8fafc',
      primary_action_color: '#d946ef',
      secondary_action_color: '#a78bfa',
      font_family: 'Space Grotesk',
      font_size: 16
    };

    let config = { ...defaultConfig };

    // Progress simulation
    let currentProgress = 0;
    const startTime = Date.now();
    const totalDuration = 5 * 60 * 1000; // 5 minutes in milliseconds

    function updateProgress() {
      const elapsed = Date.now() - startTime;
      const progress = Math.min((elapsed / totalDuration) * 100, 99.9);
      
      // Slow down significantly after 90%
      let adjustedProgress = progress;
      if (progress >= 90) {
        // Map 90-100 to 90-99.9 with exponential slowdown
        const remaining = progress - 90;
        adjustedProgress = 90 + (remaining / 10) * 9.9;
      }
      
      currentProgress = adjustedProgress;
      const progressBar = document.getElementById('progress-bar');
      const progressText = document.getElementById('progress-text');
      
      progressBar.style.width = adjustedProgress + '%';
      progressText.textContent = `Progresso da manutenção: ${Math.floor(adjustedProgress)}%`;
      
      if (adjustedProgress < 99.9) {
        requestAnimationFrame(updateProgress);
      }
    }

    // Start progress animation
    updateProgress();

    async function onConfigChange(newConfig) {
      config = { ...config, ...newConfig };
      
      // Update text content
      document.getElementById('main-title').textContent = config.main_title || defaultConfig.main_title;
      document.getElementById('subtitle').textContent = config.subtitle || defaultConfig.subtitle;
      document.getElementById('description').textContent = config.description || defaultConfig.description;
      
      // Update colors
      const bgColor = config.background_color || defaultConfig.background_color;
      const surfaceColor = config.surface_color || defaultConfig.surface_color;
      const textColor = config.text_color || defaultConfig.text_color;
      const primaryColor = config.primary_action_color || defaultConfig.primary_action_color;
      const secondaryColor = config.secondary_action_color || defaultConfig.secondary_action_color;
      
      // Background
      const wrapper = document.getElementById('app-wrapper');
      wrapper.style.background = `linear-gradient(135deg, ${bgColor} 0%, ${surfaceColor} 50%, ${bgColor} 100%)`;
      
      // Text colors
      document.getElementById('main-title').style.color = textColor;
      document.getElementById('subtitle').style.color = primaryColor;
      
      // Update gears
      const gears = document.querySelectorAll('.gear-spin');
      gears.forEach(gear => gear.style.color = primaryColor);
      const gearsReverse = document.querySelectorAll('.gear-spin-reverse');
      gearsReverse.forEach(gear => gear.style.color = secondaryColor);
      
      // Update button
      const button = document.querySelector('button[type="submit"]');
      button.style.background = `linear-gradient(135deg, ${primaryColor}, ${primaryColor}dd)`;
      
      // Update progress bar
      const progressBar = document.getElementById('progress-bar');
      if (progressBar) {
        progressBar.style.background = `linear-gradient(90deg, ${primaryColor}, ${secondaryColor})`;
      }
      
      // Update font
      const fontFamily = config.font_family || defaultConfig.font_family;
      const baseSize = config.font_size || defaultConfig.font_size;
      
      document.getElementById('main-title').style.fontFamily = `'${fontFamily}', sans-serif`;
      document.getElementById('main-title').style.fontSize = `${baseSize * 3}px`;
      document.getElementById('subtitle').style.fontSize = `${baseSize * 1.75}px`;
      document.getElementById('description').style.fontSize = `${baseSize}px`;
    }

    function mapToCapabilities(cfg) {
      return {
        recolorables: [
          {
            get: () => cfg.background_color || defaultConfig.background_color,
            set: (value) => {
              cfg.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => cfg.surface_color || defaultConfig.surface_color,
            set: (value) => {
              cfg.surface_color = value;
              window.elementSdk.setConfig({ surface_color: value });
            }
          },
          {
            get: () => cfg.text_color || defaultConfig.text_color,
            set: (value) => {
              cfg.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          },
          {
            get: () => cfg.primary_action_color || defaultConfig.primary_action_color,
            set: (value) => {
              cfg.primary_action_color = value;
              window.elementSdk.setConfig({ primary_action_color: value });
            }
          },
          {
            get: () => cfg.secondary_action_color || defaultConfig.secondary_action_color,
            set: (value) => {
              cfg.secondary_action_color = value;
              window.elementSdk.setConfig({ secondary_action_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => cfg.font_family || defaultConfig.font_family,
          set: (value) => {
            cfg.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: {
          get: () => cfg.font_size || defaultConfig.font_size,
          set: (value) => {
            cfg.font_size = value;
            window.elementSdk.setConfig({ font_size: value });
          }
        }
      };
    }

    function mapToEditPanelValues(cfg) {
      return new Map([
        ['main_title', cfg.main_title || defaultConfig.main_title],
        ['subtitle', cfg.subtitle || defaultConfig.subtitle],
        ['description', cfg.description || defaultConfig.description]
      ]);
    }

    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }


  </script>
